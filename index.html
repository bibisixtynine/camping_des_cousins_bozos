<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Fête des Créatures - OOP Edition</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ffcc00">
    <link rel="apple-touch-icon" href="icon.svg">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #87CEEB; cursor: pointer; font-family: sans-serif; }
        canvas { display: block; }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: flex; justify-content: center; align-items: center; z-index: 10; color: white; text-align: center; transition: opacity 0.5s ease; }
        #start-button { padding: 20px 40px; font-size: 24px; font-weight: bold; background: #ffcc00; color: #333; border: none; border-radius: 50px; cursor: pointer; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        #instructions { position: absolute; top: 20px; left: 20px; color: #2c3e50; pointer-events: none; opacity: 0.8; background: rgba(255,255,255,0.6); padding: 15px; border-radius: 12px; border: 2px solid white; font-weight: bold; z-index: 5; }
    </style>
</head>
<body>
    <div id="overlay">
        <button id="start-button">🚀 RÉVEILLER LA FORÊT ! 🎶</button>
    </div>
    <div id="instructions">Cliquez pour faire sauter les créatures !</div>
    <canvas id="gameCanvas"></canvas>

    <!-- Chargement des scripts dans l'ordre de dépendance -->
    <script src="config.js"></script>
    <script src="datastore.js"></script>
    <script src="audio-manager.js"></script>
    <script src="render-manager.js"></script>
    <script src="entities.js"></script>
    <script src="entity-manager.js"></script>
    <script src="app.js"></script>
    
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('service-worker.js');
            });
        }
    </script>
</body>
</html>
